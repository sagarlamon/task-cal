<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Offline — Task Calendar</title>
  <meta name="theme-color" content="#6366f1">
  <link rel="icon" type="image/png" href="logo.png">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    [data-theme="dark"] {
      --bg: #0e0e10;
      --surface: #18181b;
      --border: #2e2e35;
      --text: #f4f4f5;
      --text-muted: #71717a;
      --text-dim: #52525b;
      --accent: #6366f1;
      --danger: #ef4444;
      --shadow-lg: 0 8px 32px rgba(0,0,0,0.5);
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 40px 32px;
      max-width: 380px;
      width: 100%;
      box-shadow: var(--shadow-lg);
      text-align: center;
    }

    .icon {
      font-size: 3rem;
      margin-bottom: 20px;
      display: block;
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-8px); }
    }

    h1 {
      font-size: 1.2rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      margin-bottom: 10px;
    }

    p {
      font-size: 0.85rem;
      color: var(--text-muted);
      line-height: 1.6;
      margin-bottom: 28px;
    }

    .note {
      font-family: 'DM Mono', monospace;
      font-size: 0.72rem;
      color: var(--text-dim);
      background: #0e0e10;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 14px;
      margin-bottom: 24px;
      text-align: left;
      line-height: 1.7;
    }

    .btn {
      display: inline-block;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.875rem;
      font-weight: 500;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 11px 24px;
      cursor: pointer;
      transition: opacity 0.18s;
      text-decoration: none;
    }
    .btn:hover { opacity: 0.88; }
  </style>
</head>
<body>
  <div class="card">
    <span class="icon">📡</span>
    <h1>You're offline</h1>
    <p>Task Calendar couldn't reach the network. Your saved data is still safe — reconnect to sync.</p>
    <div class="note">
      ✓ Participants data — saved locally<br>
      ✓ Calendar selections — saved locally<br>
      ✗ Network features — unavailable
    </div>
    <a class="btn" href="index.html">Try again</a>
  </div>
</body>
</html>
